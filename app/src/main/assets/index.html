        function copyLink() {
            const input = document.getElementById("copy");
            input.select();
            document.execCommand("copy");
            document.getElementById("btn").textContent = "已复制";
        }

        window.onload = () => {
            const link = location.href;
            document.getElementById("copy").value = link;
            LeanQR.generate(link, {
                minCorrectionLevel: LeanQR.correction.H
            }).toCanvas(document.getElementById("qrcode"), {
                on: [24, 56, 43],
                off: [255, 255, 255]
            });
        };

        function send(action) {
            const xhr = new XMLHttpRequest();
            xhr.open("GET", action + "?" + Date.now());
            xhr.send();

    <style>
        :root {
            color-scheme: light dark;
            --bg: #f6faf7;
            --panel: #edf6f1;
            --panel-strong: #d8f2e6;
            --text: #17211b;
            --muted: #5d6d64;
            --primary: #1f6b53;
            --primary-text: #f4fff8;
            --shadow: 0 18px 42px rgba(28, 67, 50, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .page {
            width: min(720px, 100%);
            margin: 0 auto;
            padding: clamp(24px, 6vw, 48px) 20px 32px;
        }

        .hero,
        .panel {
            border-radius: 28px;
            background: var(--panel);
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--primary);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 8vw, 52px);
            line-height: 1.08;
            font-weight: 650;
        }

        .summary {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }

        .qr-card {
            display: grid;
            justify-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: 24px;
        }

        #qrcode {
            width: 180px;
            height: 180px;
            border-radius: 18px;
            image-rendering: pixelated;
        }

        .qr-card,
        #qrcode {
            background: #ffffff;
        }

        .copy-input {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .panel {
            margin-top: 18px;
            padding: 8px 0;
            overflow: hidden;
        }

        .info-row {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            gap: 16px;
            align-items: center;
            padding: 14px 20px;
            border-top: 1px solid rgba(31, 107, 83, 0.08);
        }

        .info-row:first-child {
            border-top: 0;
        }

        .info-row span {
            color: var(--muted);
            font-size: 14px;
        }

        .info-row strong {
            min-width: 0;
            overflow-wrap: anywhere;
            font-size: 16px;
            font-weight: 550;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .btn,
        .copy-btn {
            border: 0;
            border-radius: 999px;
            font: inherit;
            font-weight: 650;
            cursor: pointer;
        }

        .btn {
            min-height: 56px;
            padding: 0 18px;
        }

        .copy-btn {
            min-height: 40px;
            padding: 0 16px;
            color: var(--primary);
            background: var(--panel-strong);
        }

        .primary {
            color: var(--primary-text);
            background: var(--primary);
        }

        .secondary {
            color: var(--primary);
            background: var(--panel-strong);
        }

        .btn:active,
        .copy-btn:active {
            transform: translateY(1px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111a15;
                --panel: #1d2822;
                --panel-strong: #183c2e;
                --text: #edf7f1;
                --muted: #adbbb3;
                --primary: #95d4bd;
                --primary-text: #092017;
                --shadow: none;
            }

            .qr-card,
            #qrcode {
                background: #f9fdf9;
            }
        }

        @media (max-width: 640px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .qr-card {
                width: 100%;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <div>
            <p class="eyebrow">局域网控制</p>
            <h1>息屏运行</h1>
            <p class="summary">扫描二维码或打开当前地址，在同一 WLAN 内控制主机设备的亮屏与息屏。</p>
        </div>
        <aside class="qr-card" aria-label="控制页二维码">
            <canvas id="qrcode"></canvas>
            <button id="btn" class="copy-btn" onclick="copyLink()">复制链接</button>
            <input id="copy" class="copy-input" readonly>
        </aside>
    </section>

    <section class="panel" aria-label="设备信息">
        <div class="info-row">
            <span>设备品牌</span>
            <strong>{{brand}}</strong>
        </div>
        <div class="info-row">
            <span>设备信息</span>
            <strong>{{device}}</strong>
        </div>
        <div class="info-row">
            <span>当前状态</span>
            <strong>{{state}}</strong>
        </div>
    </section>

    <section class="actions" aria-label="控制操作">
        <button class="btn secondary" onclick="send(1)">亮屏</button>
        <button class="btn primary" onclick="send(2)">息屏运行</button>
    </section>
</main>
</body>
</html>
