<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>页面不存在</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f6faf7;
            --panel: #edf6f1;
            --text: #17211b;
            --muted: #5d6d64;
            --primary: #1f6b53;
            --primary-text: #f4fff8;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            box-sizing: border-box;
            width: min(420px, 100%);
            padding: 28px;
            border-radius: 28px;
            background: var(--panel);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 44px;
            line-height: 1;
            font-weight: 650;
        }

        p {
            margin: 14px 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        a {
            display: inline-grid;
            min-height: 48px;
            place-items: center;
            padding: 0 24px;
            border-radius: 999px;
            color: var(--primary-text);
            background: var(--primary);
            font-weight: 650;
            text-decoration: none;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111a15;
                --panel: #1d2822;
                --text: #edf7f1;
                --muted: #adbbb3;
                --primary: #95d4bd;
                --primary-text: #092017;
            }
        }
    </style>
</head>
<body>
<main>
    <h1>404</h1>
    <p>页面不存在，返回控制页继续操作。</p>
    <a href="/">返回控制页</a>
</main>
</body>
</html>
